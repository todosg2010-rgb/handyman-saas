<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Аналитика – TavSoft</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --primary: #60a5fa;
    --secondary: #818cf8;
    --accent: #38bdf8;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --bg-deep: #020617;
    --bg-card: rgba(15, 23, 42, 0.5);
    --glass: rgba(255, 255, 255, 0.08);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --glow-primary: rgba(96, 165, 250, 0.4);
    --glow-secondary: rgba(129, 140, 248, 0.4);
    --transition: cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
    overflow-x: hidden;
    width: 100%;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: 
        radial-gradient(1200px 800px at 10% -10%, rgba(99, 102, 241, 0.25), transparent 50%),
        radial-gradient(1000px 600px at 90% 10%, rgba(56, 189, 248, 0.2), transparent 40%),
        radial-gradient(800px 600px at 50% 100%, rgba(30, 58, 138, 0.3), transparent 50%),
        linear-gradient(180deg, #0f172a 0%, #020617 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    position: relative;
    -webkit-font-smoothing: antialiased;
}

/* Animated floating islands background */
.floating-islands {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}

.island {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.15;
    animation: float 25s infinite ease-in-out;
}

.island-1 {
    width: 400px;
    height: 400px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    top: 10%;
    left: -100px;
    animation-delay: 0s;
}

.island-2 {
    width: 300px;
    height: 300px;
    background: linear-gradient(135deg, var(--accent), var(--primary));
    top: 40%;
    right: -50px;
    animation-delay: -8s;
}

.island-3 {
    width: 350px;
    height: 350px;
    background: linear-gradient(135deg, var(--secondary), var(--accent));
    bottom: 20%;
    left: 30%;
    animation-delay: -16s;
}

@keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    25% { transform: translate(30px, -40px) scale(1.1) rotate(5deg); }
    50% { transform: translate(-20px, 20px) scale(0.95) rotate(-5deg); }
    75% { transform: translate(40px, 30px) scale(1.05) rotate(3deg); }
}

/* NAVBAR - Floating glass */
.navbar {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100%);
    width: calc(100% - 40px);
    max-width: 1400px;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(15, 23, 42, 0.7);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    z-index: 1000;
    animation: navDrop 0.8s var(--transition) 0.2s forwards;
}

@keyframes navDrop {
    to { transform: translateX(-50%) translateY(0); }
}

.navbar .logo {
    font-weight: 800;
    font-size: 1.3rem;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientShift 5s ease infinite;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.navbar .logo:hover {
    transform: scale(1.05);
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.nav-links {
    display: flex;
    gap: 8px;
    align-items: center;
}

.navbar a {
    color: #cbd5f5;
    text-decoration: none;
    padding: 10px 20px;
    font-weight: 500;
    font-size: 0.95rem;
    border-radius: 12px;
    transition: all 0.3s var(--transition);
    position: relative;
    overflow: hidden;
}

.navbar a::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(129, 140, 248, 0.2));
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 12px;
}

.navbar a:hover {
    color: white;
    transform: translateY(-2px);
}

.navbar a:hover::before {
    opacity: 1;
}

/* CONTENT */
.container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 140px 24px 60px;
}

/* Header section */
.header-section {
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s var(--transition) 0.4s forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    margin-bottom: 0.5rem;
    background: linear-gradient(180deg, #ffffff 0%, #93c5fd 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.2;
}

.subtitle {
    color: var(--text-muted);
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
}

.subtitle::before {
    content: '';
    display: inline-block;
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--primary), transparent);
    border-radius: 2px;
}

/* FLOATING CARDS GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    margin-bottom: 3rem;
}

.card {
    position: relative;
    background: var(--glass);
    border-radius: 24px;
    padding: 28px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 
        0 4px 24px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    transform: translateY(0);
    opacity: 0;
    animation: cardFloat 0.8s var(--transition) forwards;
    transition: all 0.4s var(--transition);
    overflow: hidden;
}

.card:nth-child(1) { animation-delay: 0.5s; }
.card:nth-child(2) { animation-delay: 0.6s; }
.card:nth-child(3) { animation-delay: 0.7s; }
.card:nth-child(4) { animation-delay: 0.8s; }

@keyframes cardFloat {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.3), 
        transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
}

.card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 25px;
    padding: 1px;
    background: linear-gradient(135deg, 
        rgba(96, 165, 250, 0) 0%,
        rgba(96, 165, 250, 0.4) 50%,
        rgba(129, 140, 248, 0) 100%);
    -webkit-mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    mask: 
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.5s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 0 40px var(--glow-primary),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
}

.card:hover::before {
    opacity: 1;
}

.card:hover::after {
    opacity: 1;
}

/* Card icons */
.card-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(129, 140, 248, 0.2));
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    transition: all 0.3s ease;
}

.card:hover .card-icon {
    transform: scale(1.1) rotate(-5deg);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
}

.card:nth-child(1) .card-icon { background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(52, 211, 153, 0.1)); }
.card:nth-child(2) .card-icon { background: linear-gradient(135deg, rgba(96, 165, 250, 0.2), rgba(96, 165, 250, 0.1)); }
.card:nth-child(3) .card-icon { background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(251, 191, 36, 0.1)); }
.card:nth-child(4) .card-icon { background: linear-gradient(135deg, rgba(248, 113, 113, 0.2), rgba(248, 113, 113, 0.1)); }

.card h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin: 0 0 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
}

.card .value {
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: 800;
    background: linear-gradient(90deg, #ffffff, var(--primary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    transition: all 0.3s ease;
}

.card:hover .value {
    transform: scale(1.05);
}

/* Loading shimmer for values */
.loading {
    background: linear-gradient(90deg, 
        rgba(255,255,255,0.1) 25%, 
        rgba(255,255,255,0.2) 50%, 
        rgba(255,255,255,0.1) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    height: 2rem;
    width: 80%;
}

@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* TABLE BOX - Glass island */
.table-box {
    position: relative;
    background: var(--glass);
    border-radius: 32px;
    padding: 2.5rem;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 0.8s var(--transition) 0.9s forwards;
    overflow: hidden;
}

.table-box::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.2), 
        transparent);
}

.table-box h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
}

.table-box h2::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--success);
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--success); }
    50% { opacity: 0.5; box-shadow: 0 0 20px var(--success); }
}

/* TABLE STYLING */
.table-wrapper {
    overflow-x: auto;
    border-radius: 16px;
    margin: 0 -10px;
    padding: 0 10px;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 8px;
}

thead {
    position: sticky;
    top: 0;
    z-index: 10;
}

th {
    text-align: left;
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 0 16px 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

tbody tr {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    transition: all 0.3s ease;
    opacity: 0;
    transform: translateX(-20px);
    animation: rowEnter 0.5s var(--transition) forwards;
}

tbody tr:nth-child(1) { animation-delay: 1s; }
tbody tr:nth-child(2) { animation-delay: 1.1s; }
tbody tr:nth-child(3) { animation-delay: 1.2s; }
tbody tr:nth-child(4) { animation-delay: 1.3s; }
tbody tr:nth-child(5) { animation-delay: 1.4s; }

@keyframes rowEnter {
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

tbody tr:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: scale(1.01);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
}

td {
    padding: 16px;
    border: none;
    font-size: 0.95rem;
}

td:first-child {
    border-radius: 12px 0 0 12px;
    font-weight: 500;
    color: var(--text);
}

td:last-child {
    border-radius: 0 12px 12px 0;
    text-align: right;
}

td:nth-child(2),
td:nth-child(3) {
    font-family: 'SF Mono', monospace;
    font-weight: 600;
}

td:nth-child(4) {
    font-weight: 700;
    color: var(--success);
}

/* Delete button */
.delete {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--danger);
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s ease;
    background: rgba(248, 113, 113, 0.1);
}

.delete:hover {
    background: rgba(248, 113, 113, 0.2);
    transform: scale(1.1) rotate(90deg);
    box-shadow: 0 4px 15px rgba(248, 113, 113, 0.3);
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
}

.empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: transparent;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, var(--primary), var(--secondary));
    border-radius: 4px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .navbar {
        padding: 12px 20px;
        top: 10px;
        width: calc(100% - 20px);
        border-radius: 16px;
    }
    
    .navbar .logo {
        font-size: 1.1rem;
    }
    
    .nav-links {
        gap: 4px;
    }
    
    .navbar a {
        padding: 8px 12px;
        font-size: 0.85rem;
    }
    
    .container {
        padding: 120px 16px 40px;
    }
    
    .cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }
    
    .card {
        padding: 20px;
        border-radius: 20px;
    }
    
    .card-icon {
        width: 40px;
        height: 40px;
        font-size: 20px;
    }
    
    .table-box {
        padding: 1.5rem;
        border-radius: 24px;
    }
    
    .table-wrapper {
        margin: 0 -5px;
        padding: 0 5px;
    }
    
    th {
        padding: 0 12px 12px;
        font-size: 0.7rem;
    }
    
    td {
        padding: 12px;
        font-size: 0.85rem;
    }
}

@media (max-width: 480px) {
    .cards {
        grid-template-columns: 1fr;
    }
    
    .card:hover {
        transform: translateY(-4px) scale(1.01);
    }
    
    .table-box h2 {
        font-size: 1.2rem;
    }
    
    td:first-child {
        max-width: 150px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
    * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
    
    .island {
        animation: none;
    }
}

</style>
</head>

<body>

<!-- Floating islands background -->
<div class="floating-islands">
    <div class="island island-1"></div>
    <div class="island island-2"></div>
    <div class="island island-3"></div>
</div>

<!-- Navigation -->
<div class="navbar">
    <div class="logo" onclick="location.href='/'">TavSoft</div>
    <div class="nav-links">
        {% if current_user.is_authenticated %}
            <a href="/dashboard">Към таблото</a>
            <a href="/logout">Изход</a>
        {% else %}
            <a href="/">Начало</a>
        {% endif %}
    </div>
</div>

<!-- Content -->
<div class="container">

    <div class="header-section">
        <h1>Аналитика на офертите</h1>
        <div class="subtitle">Реални числа от реални оферти</div>
    </div>

    <!-- Stats Cards -->
    <div class="cards">
        <div class="card">
            <div class="card-icon">💰</div>
            <h3>Обща печалба</h3>
            <div class="value loading" id="profit">—</div>
        </div>

        <div class="card">
            <div class="card-icon">📈</div>
            <h3>Общ оборот</h3>
            <div class="value loading" id="revenue">—</div>
        </div>

        <div class="card">
            <div class="card-icon">🧱</div>
            <h3>Материали</h3>
            <div class="value loading" id="materials">—</div>
        </div>

        <div class="card">
            <div class="card-icon">📋</div>
            <h3>Оферти</h3>
            <div class="value loading" id="jobs">—</div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-box">
        <h2>Последни оферти</h2>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Описание</th>
                        <th>Цена</th>
                        <th>Печалба</th>
                        <th>Марж</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="recent-jobs">
                    <!-- Rows will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
// Enhanced loading with animation
async function loadAnalytics() {
    try {
        const res = await fetch("/api/analytics");
        const data = await res.json();
        
        // Animate values counting up
        animateValue("profit", data.totals.profit, " €");
        animateValue("revenue", data.totals.revenue, " €");
        animateValue("materials", data.totals.materials, " €");
        animateValue("jobs", data.totals.jobs, "", true);
        
    } catch (error) {
        console.error("Failed to load analytics:", error);
    }
}

// Number counting animation
function animateValue(id, end, suffix = "", isInteger = false) {
    const element = document.getElementById(id);
    element.classList.remove("loading");
    const duration = 1500;
    const start = 0;
    const startTime = performance.now();
    
    function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 3); // Ease out cubic
        
        const current = start + (end - start) * easeProgress;
        const formatted = isInteger ? Math.round(current) : current.toFixed(2);
        element.innerText = formatted + suffix;
        
        if (progress < 1) {
            requestAnimationFrame(update);
        }
    }
    
    requestAnimationFrame(update);
}

// Load recent jobs with enhanced styling
async function loadRecent() {
    try {
        const res = await fetch("/api/jobs/recent");
        const jobs = await res.json();
        
        const tbody = document.getElementById("recent-jobs");
        tbody.innerHTML = "";
        
        if (jobs.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>Няма оферти все още</div>
                    </td>
                </tr>
            `;
            return;
        }
        
        jobs.forEach((j, index) => {
            const row = document.createElement("tr");
            row.style.animationDelay = `${1 + (index * 0.1)}s`;
            
            // Determine margin color
            const marginColor = j.margin > 30 ? 'var(--success)' : 
                               j.margin > 15 ? 'var(--warning)' : 'var(--danger)';
            
            row.innerHTML = `
                <td title="${j.description}">${j.description}</td>
                <td>${j.final_price} €</td>
                <td style="color: ${j.profit > 0 ? 'var(--success)' : 'var(--danger)'}">${j.profit} €</td>
                <td style="color: ${marginColor}">${j.margin}%</td>
                <td>
                    <span class="delete" onclick="deleteJob(${j.id})" title="Изтрий">✕</span>
                </td>
            `;
            
            tbody.appendChild(row);
        });
        
    } catch (error) {
        console.error("Failed to load recent jobs:", error);
    }
}

// Delete with confirmation animation
async function deleteJob(id) {
    const row = event.target.closest('tr');
    row.style.transform = 'translateX(100px)';
    row.style.opacity = '0';
    
    setTimeout(async () => {
        try {
            await fetch("/api/jobs/" + id, { method: "DELETE" });
            loadAnalytics();
            loadRecent();
        } catch (error) {
            console.error("Failed to delete job:", error);
            row.style.transform = '';
            row.style.opacity = '1';
        }
    }, 300);
}

// Initialize
loadAnalytics();
loadRecent();

// Refresh data every 30 seconds
setInterval(() => {
    loadAnalytics();
    loadRecent();
}, 30000);
</script>

</body>
</html>
